services:
  - type: web
    name: whatsapp-handbook-bot
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: whatsapp-auth
      mountPath: /opt/render/project/src/data/auth
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_STATE_DIR
        value: /opt/render/project/src/data/auth
      - key: DATABASE_URL
        sync: false
      - key: AWS_BEARER_TOKEN_BEDROCK
        sync: false
      - key: BEDROCK_REGION
        value: us-east-1
      - key: BEDROCK_MODEL_ID
        value: us.anthropic.claude-haiku-4-5-20251001-v1:0
      - key: BEDROCK_EMBEDDING_MODEL_ID
        value: amazon.titan-embed-text-v2:0
      - key: RAG_CHUNK_SIZE
        value: "1200"
      - key: RAG_CHUNK_OVERLAP
        value: "160"
      - key: RAG_MATCH_LIMIT
        value: "5"
